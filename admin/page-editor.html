  <script src="https://unpkg.com/grapesjs@0.21.9/dist/grapes.min.js"></script>

  <style>
    body { font-family: 'Noto Sans SC', sans-serif; }
    .gjs-frame-wrapper { overflow-y: auto !important; }
    .gjs-frame { overflow-y: auto !important; }
    .toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 24px; border-radius: 8px; color: white; z-index: 9999; animation: slideIn 0.3s ease; }
    .toast.success { background: #10B981; }
    .toast.error { background: #EF4444; }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .sidebar-item:hover { background: rgba(184, 134, 11, 0.1); }
    .editor-sidebar { width: 280px; }
    .block-item { cursor: move; padding: 10px; border: 1px solid #e5e7eb; border-radius: 8px; margin-bottom: 8px; background: white; transition: all 0.2s; }
    .block-item:hover { border-color: #B8860B; box-shadow: 0 2px 8px rgba(184,134,11,0.2); }
    .layer-item { padding: 6px 10px; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
    .layer-item:hover { background: #f9fafb; }
    .layer-item.selected { background: rgba(184,134,11,0.1); }
  </style>

    <!-- 右侧设置面板 -->

        <div id="component-settings">

      </div>
      
      <!-- 预设模板 -->

        <h3 class="text-sm font-bold text-gray-700 mb-3 uppercase">预设模板</h3>
        <div class="space-y-2">
          <button onclick="loadTemplate('homepage')" class="w-full px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm transition text-left">
            首页完整模板
          </button>
          <button onclick="loadTemplate('landing')" class="w-full px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm transition text-left">
            落地页模板
          </button>

      </div>

  <div id="toast-container"></div>

  <script>
    const API_BASE = '/api';
    let editor = null;

    // 检查登录
    function checkAuth() {
      const loggedIn = sessionStorage.getItem('admin_logged_in');
      if (!loggedIn) {
        window.location.href = 'index.html';
      }
    }
    checkAuth();

    // Toast 提示
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // 初始化 GrapesJS 编辑器
    function initEditor() {
      editor = grapesjs.init({
        container: '#gjs',
        height: '100%',
        fromElement: true,
        storageManager: false,
        deviceManager: {
          devices: [{
            name: 'Desktop',
            width: '',
          }, {
            name: 'Mobile',
            width: '375px',
            widthMedia: '480px',
          }]
        },
        panels: { defaults: [] },
        blockManager: {
          appendTo: '#blocks-container',
          blocks: []
        },
        styleManager: {
          appendTo: '#styles-container',
        },
        layerManager: {
          appendTo: '#layers-container',
        },
        traitManager: {
          appendTo: '#component-settings',
        },
      });

      // 拖拽组件到画布
      document.querySelectorAll('.block-item').forEach(item => {
        item.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('block-type', item.dataset.type);
        });
      });

      // 放置组件
      const canvas = document.querySelector('#gjs iframe');
      if (canvas) {
        canvas.addEventListener('drop', handleDrop);
        canvas.addEventListener('dragover', (e) => e.preventDefault());
      } else {
        document.getElementById('gjs').addEventListener('drop', handleDrop);
        document.getElementById('gjs').addEventListener('dragover', (e) => e.preventDefault());
      }

      // 选择组件时更新设置面板
      editor.on('component:selected', () => {
        updateSettingsPanel();
      });

      // 双击添加组件
      document.querySelectorAll('.block-item').forEach(item => {
        item.addEventListener('dblclick', () => {
          addBlockToCanvas(item.dataset.type);
        });
      });
    }

    // 处理拖拽放置
    function handleDrop(e) {
      e.preventDefault();
      const type = e.dataTransfer.getData('block-type');
      if (type) {
        addBlockToCanvas(type);
      }
    }

    // 添加组件到画布
    function addBlockToCanvas(type) {
      const components = {
        hero: createHeroBlock(),
        services: createServicesBlock(),
        features: createFeaturesBlock(),
        articles: createArticlesBlock(),
        contact: createContactBlock(),
        text: '<div class="text-block p-8"><h2>双击编辑标题</h2><p>点击添加文本内容。这是一个可编辑的文本区块。</p></div>',
        image: '<div class="image-block p-4"><img src="https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=800&h=400&fit=crop" alt="图片" style="width:100%;border-radius:8px;"></div>',
        divider: '<hr style="margin:40px 0;border:none;border-top:1px solid #e5e7eb;">'
      };

      const content = components[type];
      if (content && editor) {
        editor.addComponents(content);
      }
    }

    // 创建 Hero 组件
    function createHeroBlock() {
      return `
        <section class="hero-section" style="background:linear-gradient(135deg,#1F2937 0%,#111827 100%);padding:100px 20px;text-align:center;color:white;">

          <p style="font-size:1.25rem;margin-bottom:30px;opacity:0.9;">为上市公司、企业及个人提供全方位资金解决方案</p>
          <button style="padding:15px 40px;background:linear-gradient(135deg,#B8860B,#DAA520);color:white;border:none;border-radius:8px;font-size:1rem;cursor:pointer;">立即咨询</button>
        </section>

              </div>

    // 创建行业资讯组件
    function createArticlesBlock() {

    // 创建联系我们组件
    function createContactBlock() {
      return `
        <section class="contact-section" style="padding:80px 20px;background:linear-gradient(135deg,#1F2937 0%,#111827 100%);color:white;">
          <h2 style="text-align:center;font-size:2rem;font-weight:bold;margin-bottom:40px;">联系我们</h2>
          <div style="max-width:600px;margin:0 auto;">
            <div style="background:rgba(255,255,255,0.1);padding:40px;border-radius:16px;">
              <div style="margin-bottom:20px;">
                <label style="display:block;margin-bottom:8px;">您的姓名</label>

                <label style="display:block;margin-bottom:8px;">联系电话</label>

              </div>
              <div style="margin-bottom:20px;">
                <label style="display:block;margin-bottom:8px;">咨询内容</label>
                <textarea placeholder="请输入咨询内容" rows="4" style="width:100%;padding:12px;border-radius:8px;border:none;resize:none;"></textarea>
              </div>
              <button style="width:100%;padding:15px;background:linear-gradient(135deg,#B8860B,#DAA520);color:white;border:none;border-radius:8px;font-size:1rem;cursor:pointer;">提交咨询</button>
            </div>
          </div>
        </section>
      `;
    }

    // 更新设置面板
    function updateSettingsPanel() {
      const selected = editor.getSelected();
      if (!selected) return;

      const container = document.getElementById('component-settings');
      const tagName = selected.get('tagName');
      const content = selected.get('content');

      container.innerHTML = `
        <div class="space-y-3">
          <div>
            <label class="block text-sm text-gray-600 mb-1">HTML标签</label>
            <input type="text" value="${tagName}" disabled class="w-full px-3 py-2 bg-gray-100 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">样式类名</label>
            <input type="text" value="${selected.get('classes')?.toString() || ''}" onchange="updateClasses(this.value)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
          </div>
          <div>
            <label class="block text-sm text-gray-600 mb-1">ID</label>
            <input type="text" value="${selected.getId() || ''}" onchange="updateId(this.value)" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
          </div>
          <button onclick="deleteComponent()" class="w-full px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm transition">删除组件</button>
        </div>
      `;
    }

    // 更新类名
    function updateClasses(classes) {
      const selected = editor.getSelected();
      if (selected) {
        selected.set('classes', classes.split(' ').filter(c => c));
      }
    }

    // 更新ID
    function updateId(id) {
      const selected = editor.getSelected();
      if (selected) {
        selected.setId(id);
      }
    }

    // 删除组件
    function deleteComponent() {
      const selected = editor.getSelected();
      if (selected && confirm('确定删除此组件？')) {
        selected.remove();
      }
    }

    // 预览模式
    function previewMode() {
      editor.runCommand('preview');
    }

    // 保存页面
    async function savePage() {
      const html = editor.getHtml();
      const css = editor.getCss();
      const pageData = { html, css, updated_at: new Date().toISOString() };

      try {
        // 保存到 localStorage 作为演示
        localStorage.setItem('page_editor_content', JSON.stringify(pageData));
        showToast('页面保存成功！');
      } catch (e) {
        showToast('保存失败', 'error');
      }
    }

    // 加载预设模板
    function loadTemplate(template) {
      if (!confirm('加载模板将覆盖当前内容，确定继续？')) return;

      let content = '';
      if (template === 'homepage') {
        content = createHeroBlock() + createServicesBlock() + createFeaturesBlock() + createArticlesBlock() + createContactBlock();
      } else if (template === 'landing') {
        content = createHeroBlock() + createFeaturesBlock() + createContactBlock();
      }

      if (editor && content) {
        editor.setComponents(content);
        showToast('模板加载成功！');
      }
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      initEditor();
      
      // 加载已保存的内容
      setTimeout(() => {
        const saved = localStorage.getItem('page_editor_content');
        if (saved) {
          try {
            const data = JSON.parse(saved);
            if (data.html && editor) {
              editor.setComponents(data.html);
            }
          } catch (e) {}
        }
      }, 500);
    });
  </script>
</body>
</html>
