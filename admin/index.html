<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理登录 - 鼎丰资金</title>
  <link rel="preconnect" href="https://fonts.googleapis.cn">
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
  <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);">
  
  <div class="w-full max-w-md px-6 fade-in">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-yellow-500 to-yellow-600 mb-4">
        <span class="text-2xl font-bold text-white">DF</span>
      </div>
      <h1 class="text-2xl font-bold text-white mb-2">鼎丰资金</h1>
      <p class="text-gray-400">后台管理系统</p>
    </div>

    <!-- Login Form -->
    <div class="bg-white/5 backdrop-blur-md rounded-2xl p-8" style="border: 1px solid rgba(184, 134, 11, 0.2);">
      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">管理员密码</label>
          <input type="password" id="password" 
            class="w-full px-4 py-3 bg-white/10 border rounded-xl text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-yellow-500 transition-all"
            placeholder="请输入管理员密码" required>
        </div>
        
        <button type="submit" 
          class="w-full py-3 bg-gradient-to-r from-yellow-600 to-yellow-500 text-white font-semibold rounded-xl hover:from-yellow-500 hover:to-yellow-400 transition-all transform hover:scale-[1.02]">
          登录
        </button>
      </form>

      <p id="errorMsg" class="mt-4 text-center text-red-400 text-sm hidden"></p>
    </div>

    <!-- Footer -->
    <p class="text-center text-gray-500 text-sm mt-6">
      <a href="/" class="hover:text-yellow-500 transition-colors">返回首页</a>
    </p>
  </div>

  <script>
    // Simple admin password check (in production, use proper authentication)
    const ADMIN_PASSWORD = 'df888888';

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('errorMsg');

      if (password === ADMIN_PASSWORD) {
        sessionStorage.setItem('adminLoggedIn', 'true');
        window.location.href = '/admin/dashboard.html';
      } else {
        errorMsg.textContent = '密码错误，请重试';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
