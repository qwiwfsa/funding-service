<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - 鼎丰资金</title>
  <link rel="preconnect" href="https://fonts.googleapis.cn">
  <link rel="preconnect" href="https://fonts.gstatic.cn" crossorigin>
  <link href="https://fonts.googleapis.cn/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Noto Sans SC', sans-serif; }
    .sidebar-item:hover { background: rgba(184, 134, 11, 0.1); }
    .sidebar-item.active { background: rgba(184, 134, 11, 0.2); color: #B8860B; }
    .tab-btn.active { border-bottom-color: #B8860B; color: #B8860B; }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="min-h-screen bg-gray-100" style="font-family: 'Noto Sans SC', sans-serif;">
  
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-lg fixed h-full overflow-y-auto">
      <div class="p-6 border-b" style="border-color: rgba(184, 134, 11, 0.1);">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-yellow-600 to-yellow-500 flex items-center justify-center">
            <span class="text-lg font-bold text-white">DF</span>
          </div>
          <div>
            <h1 class="font-bold" style="color: #B8860B;">鼎丰资金</h1>
            <p class="text-xs text-gray-500">后台管理系统</p>
          </div>
        </div>
      </div>

      <nav class="p-4 space-y-1">
        <a href="#" class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 transition-all" data-page="dashboard">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
          <span>数据概览</span>
        </a>
        <a href="#" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 transition-all" data-page="consultations">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
          </svg>
          <span>用户咨询</span>
        </a>
        <a href="#" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 transition-all" data-page="articles">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"></path>
          </svg>
          <span>文章管理</span>
        </a>
        <a href="#" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg text-gray-700 transition-all" data-page="cases">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
          </svg>
          <span>案例管理</span>
        </a>
      </nav>

      <div class="absolute bottom-0 left-0 right-0 p-4 border-t" style="border-color: rgba(184, 134, 11, 0.1);">
        <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-500 hover:text-gray-700 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 15l-3-3m0 0l8-8m-8 8h12"></path>
          </svg>
          <span>返回首页</span>
        </a>
        <button onclick="logout()" class="w-full mt-2 flex items-center gap-3 px-4 py-3 rounded-lg text-red-500 hover:bg-red-50 transition-all">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
          <span>退出登录</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 ml-64 p-8">
      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page-content fade-in">
        <h2 class="text-2xl font-bold mb-6" style="color: #1F2937;">数据概览</h2>
        
        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-xl p-6 shadow-sm" style="border: 1px solid rgba(184, 134, 11, 0.1);">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm mb-1">总咨询数</p>
                <p class="text-3xl font-bold" style="color: #B8860B;" id="stat-total">0</p>
              </div>
              <div class="w-12 h-12 rounded-lg bg-yellow-100 flex items-center justify-center">
                <svg class="w-6 h-6 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                </svg>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm" style="border: 1px solid rgba(184, 134, 11, 0.1);">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm mb-1">待处理</p>
                <p class="text-3xl font-bold text-orange-500" id="stat-pending">0</p>
              </div>
              <div class="w-12 h-12 rounded-lg bg-orange-100 flex items-center justify-center">
                <svg class="w-6 h-6 text-orange-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm" style="border: 1px solid rgba(184, 134, 11, 0.1);">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm mb-1">已联系</p>
                <p class="text-3xl font-bold text-blue-500" id="stat-contacted">0</p>
              </div>
              <div class="w-12 h-12 rounded-lg bg-blue-100 flex items-center justify-center">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                </svg>
              </div>
            </div>
          </div>
          <div class="bg-white rounded-xl p-6 shadow-sm" style="border: 1px solid rgba(184, 134, 11, 0.1);">
            <div class="flex items-center justify-between">
              <div>
                <p class="text-gray-500 text-sm mb-1">已完成</p>
                <p class="text-3xl font-bold text-green-500" id="stat-completed">0</p>
              </div>
              <div class="w-12 h-12 rounded-lg bg-green-100 flex items-center justify-center">
                <svg class="w-6 h-6 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
              </div>
            </div>
          </div>
        </div>

        <!-- Recent Consultations -->
        <div class="bg-white rounded-xl shadow-sm" style="border: 1px solid rgba(184, 134, 11, 0.1);">
          <div class="p-6 border-b" style="border-color: rgba(184, 134, 11, 0.1);">
            <h3 class="font-bold" style="color: #1F2937;">最新咨询</h3>
          </div>
          <div class="p-6">
            <div id="recent-list" class="space-y-4">
              <p class="text-gray-500 text-center py-8">加载中...</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Consultations Page -->
      <div id="page-consultations" class="page-content hidden fade-in">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-bold" style="color: #1F2937;">用户咨询管理</h2>
          <select id="filter-status" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500">
            <option value="all">全部状态</option>
            <option value="pending">待处理</option>
            <option value="contacted">已联系</option>
            <option value="completed">已完成</option>
          </select>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden" style="border: 1px solid rgba(184, 134, 11, 0.1);">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">姓名</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">电话</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">邮箱</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">公司</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">业务类型</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">状态</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">时间</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
              </tr>
            </thead>
            <tbody id="consultations-table" class="divide-y divide-gray-200">
              <tr><td colspan="8" class="px-6 py-8 text-center text-gray-500">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Articles Page -->
      <div id="page-articles" class="page-content hidden fade-in">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-bold" style="color: #1F2937;">文章管理</h2>
          <button onclick="showAddArticleModal()" class="px-4 py-2 bg-gradient-to-r from-yellow-600 to-yellow-500 text-white rounded-lg hover:from-yellow-500 hover:to-yellow-400 transition-all">
            + 添加文章
          </button>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden" style="border: 1px solid rgba(184, 134, 11, 0.1);">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">标题</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">分类</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">浏览量</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">发布时间</th>
                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">操作</th>
              </tr>
            </thead>
            <tbody id="articles-table" class="divide-y divide-gray-200">
              <tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">加载中...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Cases Page -->
      <div id="page-cases" class="page-content hidden fade-in">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-2xl font-bold" style="color: #1F2937;">案例管理</h2>
          <button onclick="showAddCaseModal()" class="px-4 py-2 bg-gradient-to-r from-yellow-600 to-yellow-500 text-white rounded-lg hover:from-yellow-500 hover:to-yellow-400 transition-all">
            + 添加案例
          </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="cases-grid">
          <p class="text-gray-500 col-span-full text-center py-8">加载中...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
    <div class="bg-white rounded-xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
      <div class="p-6 border-b" style="border-color: rgba(184, 134, 11, 0.1);">
        <h3 class="text-lg font-bold" style="color: #1F2937;" id="modal-title">标题</h3>
      </div>
      <div class="p-6" id="modal-content">
        <!-- Modal content here -->
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    // Check login
    if (!sessionStorage.getItem('adminLoggedIn')) {
      window.location.href = '/admin/index.html';
    }

    // Logout
    function logout() {
      sessionStorage.removeItem('adminLoggedIn');
      window.location.href = '/admin/index.html';
    }

    // Navigation
    document.querySelectorAll('.sidebar-item[data-page]').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const page = item.dataset.page;
        
        // Update active state
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        
        // Show page
        document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
        document.getElementById(`page-${page}`).classList.remove('hidden');
        
        // Load data
        if (page === 'dashboard') loadDashboard();
        if (page === 'consultations') loadConsultations();
        if (page === 'articles') loadArticles();
        if (page === 'cases') loadCases();
      });
    });

    // API helpers
    async function api(url, options = {}) {
      const res = await fetch(API_BASE + url);
      const data = await res.json();
      if (!data.success) throw new Error(data.error);
      return data;
    }

    // Load Dashboard
    async function loadDashboard() {
      try {
        const data = await api('/consultations');
        const consultations = data.data || [];
        
        document.getElementById('stat-total').textContent = consultations.length;
        document.getElementById('stat-pending').textContent = consultations.filter(c => c.status === 'pending').length;
        document.getElementById('stat-contacted').textContent = consultations.filter(c => c.status === 'contacted').length;
        document.getElementById('stat-completed').textContent = consultations.filter(c => c.status === 'completed').length;
        
        const recentList = document.getElementById('recent-list');
        const recent = consultations.slice(0, 5);
        
        if (recent.length === 0) {
          recentList.innerHTML = '<p class="text-gray-500 text-center py-8">暂无数据</p>';
        } else {
          recentList.innerHTML = recent.map(c => `
            <div class="flex items-center justify-between p-4 rounded-lg bg-gray-50">
              <div>
                <p class="font-medium" style="color: #1F2937;">${c.name || '匿名用户'}</p>
                <p class="text-sm text-gray-500">${c.phone || ''} ${c.company ? '- ' + c.company : ''}</p>
                <p class="text-sm text-gray-400 mt-1">${c.message || ''}</p>
              </div>
              <span class="px-3 py-1 text-xs rounded-full ${getStatusClass(c.status)}">${getStatusText(c.status)}</span>
            </div>
          `).join('');
        }
      } catch (err) {
        console.error('Failed to load dashboard:', err);
      }
    }

    // Load Consultations
    async function loadConsultations(status = 'all') {
      try {
        const url = status === 'all' ? '/consultations' : `/consultations?status=${status}`;
        const data = await api(url);
        const consultations = data.data || [];
        
        const tbody = document.getElementById('consultations-table');
        if (consultations.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" class="px-6 py-8 text-center text-gray-500">暂无数据</td></tr>';
        } else {
          tbody.innerHTML = consultations.map(c => `
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4">${c.name || '-'}</td>
              <td class="px-6 py-4">${c.phone || '-'}</td>
              <td class="px-6 py-4">${c.email || '-'}</td>
              <td class="px-6 py-4">${c.company || '-'}</td>
              <td class="px-6 py-4">${c.business_type || '-'}</td>
              <td class="px-6 py-4">
                <select onchange="updateStatus(${c.id}, this.value)" class="px-2 py-1 text-xs rounded border ${getStatusClass(c.status)} cursor-pointer">
                  <option value="pending" ${c.status === 'pending' ? 'selected' : ''}>待处理</option>
                  <option value="contacted" ${c.status === 'contacted' ? 'selected' : ''}>已联系</option>
                  <option value="completed" ${c.status === 'completed' ? 'selected' : ''}>已完成</option>
                </select>
              </td>
              <td class="px-6 py-4 text-sm text-gray-500">${new Date(c.created_at).toLocaleDateString()}</td>
              <td class="px-6 py-4">
                <button onclick="showConsultDetail(${c.id})" class="text-yellow-600 hover:text-yellow-700 text-sm">详情</button>
              </td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error('Failed to load consultations:', err);
      }
    }

    // Update consultation status
    async function updateStatus(id, status) {
      try {
        await api(`/consultations/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        loadDashboard();
      } catch (err) {
        alert('更新失败: ' + err.message);
      }
    }

    // Show consultation detail
    async function showConsultDetail(id) {
      try {
        const data = await api('/consultations');
        const c = data.data.find(item => item.id === id);
        if (!c) return;
        
        showModal('咨询详情', `
          <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="text-sm text-gray-500">姓名</label>
                <p class="font-medium">${c.name || '-'}</p>
              </div>
              <div>
                <label class="text-sm text-gray-500">电话</label>
                <p class="font-medium">${c.phone || '-'}</p>
              </div>
              <div>
                <label class="text-sm text-gray-500">邮箱</label>
                <p class="font-medium">${c.email || '-'}</p>
              </div>
              <div>
                <label class="text-sm text-gray-500">公司</label>
                <p class="font-medium">${c.company || '-'}</p>
              </div>
            </div>
            <div>
              <label class="text-sm text-gray-500">业务类型</label>
              <p class="font-medium">${c.business_type || '-'}</p>
            </div>
            <div>
              <label class="text-sm text-gray-500">留言内容</label>
              <p class="p-3 bg-gray-50 rounded-lg">${c.message || '-'}</p>
            </div>
            <div>
              <label class="text-sm text-gray-500">提交时间</label>
              <p class="font-medium">${new Date(c.created_at).toLocaleString()}</p>
            </div>
          </div>
        `);
      } catch (err) {
        alert('加载失败: ' + err.message);
      }
    }

    // Load Articles
    async function loadArticles() {
      try {
        const data = await api('/articles');
        const articles = data.data || [];
        
        const tbody = document.getElementById('articles-table');
        if (articles.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="px-6 py-8 text-center text-gray-500">暂无数据</td></tr>';
        } else {
          tbody.innerHTML = articles.map(a => `
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4">${a.id}</td>
              <td class="px-6 py-4">${a.title}</td>
              <td class="px-6 py-4">${a.article_categories?.name || '-'}</td>
              <td class="px-6 py-4">${a.views}</td>
              <td class="px-6 py-4 text-sm text-gray-500">${new Date(a.created_at).toLocaleDateString()}</td>
              <td class="px-6 py-4">
                <button onclick="showArticleDetail(${a.id})" class="text-yellow-600 hover:text-yellow-700 text-sm mr-2">查看</button>
                <button onclick="deleteArticle(${a.id})" class="text-red-600 hover:text-red-700 text-sm">删除</button>
              </td>
            </tr>
          `).join('');
        }
      } catch (err) {
        console.error('Failed to load articles:', err);
      }
    }

    // Show article detail
    async function showArticleDetail(id) {
      try {
        const data = await api(`/articles/${id}`);
        const a = data.data;
        
        showModal(a.title, `
          <div class="space-y-4">
            <img src="${a.image}" alt="${a.title}" class="w-full h-48 object-cover rounded-lg">
            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="text-sm text-gray-500">分类</label>
                <p class="font-medium">${a.article_categories?.name || '-'}</p>
              </div>
              <div>
                <label class="text-sm text-gray-500">作者</label>
                <p class="font-medium">${a.author || '-'}</p>
              </div>
              <div>
                <label class="text-sm text-gray-500">浏览量</label>
                <p class="font-medium">${a.views}</p>
              </div>
              <div>
                <label class="text-sm text-gray-500">发布时间</label>
                <p class="font-medium">${new Date(a.created_at).toLocaleDateString()}</p>
              </div>
            </div>
            <div>
              <label class="text-sm text-gray-500">摘要</label>
              <p class="p-3 bg-gray-50 rounded-lg">${a.excerpt || '-'}</p>
            </div>
            <div>
              <label class="text-sm text-gray-500">正文</label>
              <p class="p-3 bg-gray-50 rounded-lg whitespace-pre-wrap">${a.content || '-'}</p>
            </div>
          </div>
        `);
      } catch (err) {
        alert('加载失败: ' + err.message);
      }
    }

    // Load Cases
    async function loadCases() {
      try {
        const data = await api('/cases');
        const cases = data.data || [];
        
        const grid = document.getElementById('cases-grid');
        if (cases.length === 0) {
          grid.innerHTML = '<p class="text-gray-500 col-span-full text-center py-8">暂无数据</p>';
        } else {
          grid.innerHTML = cases.map(c => `
            <div class="bg-white rounded-xl overflow-hidden shadow-sm" style="border: 1px solid rgba(184, 134, 11, 0.1);">
              <div class="aspect-[4/3] overflow-hidden">
                <img src="${c.image}" alt="${c.title}" class="w-full h-full object-cover">
              </div>
              <div class="p-4">
                <span class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-700">${c.category}</span>
                <h4 class="font-bold mt-2" style="color: #1F2937;">${c.title}</h4>
                <p class="text-sm text-gray-500 mt-1">${c.description || ''}</p>
              </div>
            </div>
          `).join('');
        }
      } catch (err) {
        console.error('Failed to load cases:', err);
      }
    }

    // Status helpers
    function getStatusClass(status) {
      const classes = {
        pending: 'bg-orange-100 text-orange-700',
        contacted: 'bg-blue-100 text-blue-700',
        completed: 'bg-green-100 text-green-700'
      };
      return classes[status] || 'bg-gray-100 text-gray-700';
    }

    function getStatusText(status) {
      const texts = {
        pending: '待处理',
        contacted: '已联系',
        completed: '已完成'
      };
      return texts[status] || status;
    }

    // Modal helpers
    function showModal(title, content) {
      document.getElementById('modal-title').textContent = title;
      document.getElementById('modal-content').innerHTML = content;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function hideModal() {
      document.getElementById('modal').classList.add('hidden');
      document.getElementById('modal').classList.remove('flex');
    }

    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') hideModal();
    });

    // Filter status
    document.getElementById('filter-status').addEventListener('change', (e) => {
      loadConsultations(e.target.value);
    });

    // Initial load
    loadDashboard();
  </script>
</body>
</html>
